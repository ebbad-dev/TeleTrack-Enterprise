# ═══════════════════════════════════════════════════════════════════
# TeleTrack Enterprise — CI/CD Pipeline
# Lint, test, and build on every push/PR
# ═══════════════════════════════════════════════════════════════════

name: TeleTrack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Checks ──────────────────────────────────────────────
  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: teletrack
          POSTGRES_PASSWORD: teletrack_pass
          POSTGRES_DB: teletrack_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python linting
        run: python -m py_compile app.py && echo "Syntax OK"

      - name: Verify all models compile
        run: python -c "from app import create_app; app = create_app(); print('App created successfully')"
        env:
          DATABASE_URL: postgresql://teletrack:teletrack_pass@localhost:5432/teletrack_test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-key
          FLASK_ENV: testing

      - name: Run database migrations
        run: |
          python -c "
          from app import create_app
          from extensions import db
          app = create_app()
          with app.app_context():
              db.create_all()
              print('All tables created successfully')
          "
        env:
          DATABASE_URL: postgresql://teletrack:teletrack_pass@localhost:5432/teletrack_test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-key
          FLASK_ENV: testing

  # ─── Frontend Checks ────────────────────────────────────────────
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: Build production bundle
        run: npm run build

  # ─── Docker Build ────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t teletrack-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t teletrack-frontend:ci ./frontend

      - name: Verify docker-compose config
        run: docker compose config
