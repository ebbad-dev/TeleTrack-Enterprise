<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TeleTrack V4 — System Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #020a0f;
            --bg2: #040e14;
            --s1: #071419;
            --panel: #0d1f28;
            --border: #143040;
            --border2: #1a3d4d;
            --cyan: #00d4ff;
            --cyan2: #00a8cc;
            --cyan3: #00fff0;
            --green: #00ff88;
            --red: #ff3860;
            --amber: #ffb300;
            --text: #e0f4f8;
            --text2: #7ab8c8;
            --text3: #3a6070;
            --font: 'Outfit', sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --display: 'Bebas Neue', sans-serif;
        }

        * { cursor: none !important; }
        #cursor { pointer-events: none; position: fixed; z-index: 10000; width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 15px var(--cyan), 0 0 30px rgba(0,212,255,.4); transition: width .1s, height .1s; }
        #cursor-ring { pointer-events: none; position: fixed; z-index: 9999; width: 30px; height: 30px; border: 1px solid rgba(0,212,255,.4); border-radius: 50%; transform: translate(-50%,-50%); transition: width .18s, height .18s; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* CANVAS PARTICLE BACKGROUND */
        canvas#particleCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* GRID */
        .grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(0,212,255,.018) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,.018) 1px, transparent 1px); background-size: 60px 60px; }
        .scanlines { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.025) 2px, rgba(0,0,0,.025) 4px); }

        /* AMBIENT GLOW */
        .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; animation: orbDrift 15s ease-in-out infinite alternate; }
        .orb1 { width: 600px; height: 600px; top: -250px; left: -150px; background: radial-gradient(circle, rgba(0,212,255,.08), transparent 65%); }
        .orb2 { width: 500px; height: 500px; bottom: -200px; right: -100px; background: radial-gradient(circle, rgba(0,255,136,.05), transparent 65%); animation-delay: -7s; }
        @keyframes orbDrift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.06); } }

        /* LOGO HOLOGRAM */
        .logo-wrap {
            position: absolute;
            top: 40px; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            animation: fadeDown 1s ease both;
        }
        @keyframes fadeDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .logo-name { font-family: var(--display); font-size: 42px; letter-spacing: 6px; background: linear-gradient(90deg, var(--cyan), var(--cyan3), var(--cyan)); background-size: 200%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s ease infinite; }
        @keyframes shimmer { 0%,100%{background-position:0%} 50%{background-position:100%} }
        .logo-sub { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 4px; margin-top: 4px; text-transform: uppercase; }

        /* LOGIN CARD */
        .card {
            position: relative; z-index: 10;
            background: rgba(7, 20, 25, 0.7);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 48px;
            width: 440px;
            margin-top: 60px;
            box-shadow: 0 0 0 1px rgba(0,212,255,.05), 0 40px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            animation: cardReveal 1s cubic-bezier(.34,1.56,.64,1) .3s both;
        }
        @keyframes cardReveal { from { opacity: 0; transform: scale(.9) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* Animated border glow on card */
        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 21px;
            padding: 1px;
            background: linear-gradient(135deg, var(--cyan), transparent 50%, var(--cyan3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            opacity: 0.3;
            animation: borderGlow 3s ease-in-out infinite alternate;
        }
        @keyframes borderGlow { from { opacity: 0.2; } to { opacity: 0.6; } }

        .card-header { margin-bottom: 36px; text-align: center; }
        .card-title { font-size: 22px; font-weight: 700; letter-spacing: .5px; }
        .card-subtitle { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 8px; letter-spacing: 2px; }

        /* BOOT SEQUENCE TEXT */
        .boot-seq { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 28px; height: 14px; overflow: hidden; }
        .boot-seq span { color: var(--cyan); }

        /* FORM FIELDS */
        .field { position: relative; margin-bottom: 20px; }
        .field input {
            width: 100%; background: rgba(2,10,15,.6); border: 1px solid var(--border2);
            border-radius: 12px; padding: 18px 16px 6px;
            color: var(--text); font-family: var(--font); font-size: 15px;
            outline: none; transition: border-color .25s, box-shadow .25s;
            appearance: none; -webkit-appearance: none;
        }
        .field input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,212,255,.07), inset 0 0 20px rgba(0,212,255,.02); }
        .field label {
            position: absolute; left: 16px; top: 14px;
            font-family: var(--mono); font-size: 12px; color: var(--text3);
            pointer-events: none; transition: all .2s ease;
            letter-spacing: 1px;
        }
        .field input:focus ~ label, .field input:not(:placeholder-shown) ~ label {
            top: 7px; font-size: 9px; color: var(--cyan); letter-spacing: 1.5px;
        }
        .field-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 16px; transition: color .2s; }
        .field:focus-within .field-icon { color: var(--cyan); }

        /* SUBMIT BUTTON */
        .btn-login {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #006e8a, var(--cyan2));
            color: #fff; font-family: var(--font); font-size: 15px; font-weight: 700;
            border: none; border-radius: 12px; letter-spacing: 2px; text-transform: uppercase;
            transition: all .25s ease; position: relative; overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,168,204,.2);
        }
        .btn-login::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,.1), transparent);
            opacity: 0; transition: opacity .2s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(0,212,255,.35); }
        .btn-login:hover::before { opacity: 1; }
        .btn-login:active { transform: translateY(0); }
        .btn-login.loading { pointer-events: none; opacity: .7; }
        .btn-login.loading::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent); animation: shimmerBtn 1.2s infinite; }
        @keyframes shimmerBtn { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

        /* ERROR STATE */
        .error-msg { background: rgba(255,56,96,.06); border: 1px solid rgba(255,56,96,.2); border-left: 3px solid var(--red); border-radius: 8px; padding: 12px 16px; font-family: var(--mono); font-size: 11px; color: var(--red); margin-bottom: 20px; display: none; }
        .shake { animation: shake .4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }

        /* CREDENTIALS HINT */
        .cred-hint { text-align: center; margin-top: 24px; font-family: var(--mono); font-size: 10px; color: var(--text3); border-top: 1px solid var(--border); padding-top: 18px; line-height: 2; }
        .cred-hint span { color: var(--cyan); }

        /* STATUS BAR */
        .status-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 28px; background: rgba(4,14,20,.9); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-family: var(--mono); font-size: 10px; color: var(--text3); z-index: 10; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); display: inline-block; margin-right: 6px; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <canvas id="particleCanvas"></canvas>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="logo-wrap">
        <div class="logo-name">TELETRACK</div>
        <div class="logo-sub">Network Monitoring System V4</div>
    </div>

    <div class="card" id="login-card">
        <div class="card-header">
            <div class="card-title">System Authentication</div>
            <div class="card-subtitle">// SECURE ACCESS REQUIRED</div>
        </div>

        <div class="boot-seq" id="boot-seq">&gt; <span>Initializing secure channel...</span></div>

        <div class="error-msg" id="error-msg">⚠ Authentication failed — Invalid credentials</div>

        <div class="field">
            <input type="text" id="username" placeholder=" " autocomplete="username"/>
            <label for="username">OPERATOR ID</label>
            <span class="field-icon">◈</span>
        </div>
        <div class="field">
            <input type="password" id="password" placeholder=" " autocomplete="current-password"/>
            <label for="password">ACCESS CODE</label>
            <span class="field-icon">●</span>
        </div>

        <button class="btn-login" id="login-btn" onclick="doLogin()">◈ &nbsp; INITIATE ACCESS</button>

        <div class="cred-hint">
            Admin: <span>admin</span> / <span>teletrack2024</span><br>
            Operator: <span>operator</span> / <span>operator123</span>
        </div>
    </div>

    <div class="status-bar">
        <div><span class="status-dot"></span>SYSTEMS ONLINE — AES-256 ENCRYPTED LINK ACTIVE</div>
        <div id="sys-time" style="color: var(--cyan);">00:00:00</div>
    </div>

    <script>
        // CURSOR
        const c = document.getElementById('cursor'), cr = document.getElementById('cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; c.style.left = mx+'px'; c.style.top = my+'px'; });
        (function animR() { rx += (mx-rx)*.15; ry += (my-ry)*.15; cr.style.left = rx+'px'; cr.style.top = ry+'px'; requestAnimationFrame(animR); })();

        // CLOCK
        setInterval(() => { document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); }, 1000);

        // PARTICLE CANVAS
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.3;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = Math.random() > 0.7 ? '#00ff88' : '#00d4ff';
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        for (let i = 0; i < 120; i++) particles.push(new Particle());

        // Connection lines between nearby particles
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = '#00d4ff';
                        ctx.globalAlpha = (1 - dist/100) * 0.05;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            drawConnections();
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // BOOT SEQUENCE MESSAGES
        const bootMsgs = [
            '> <span>Kernel v4.1.0 loaded...</span>',
            '> <span>Connecting to database cluster...</span>',
            '> <span>TLS 1.3 handshake complete...</span>',
            '> <span>Awaiting operator credentials...</span>'
        ];
        let bi = 0;
        const bootEl = document.getElementById('boot-seq');
        setInterval(() => {
            bootEl.innerHTML = bootMsgs[bi % bootMsgs.length];
            bi++;
        }, 2200);

        // LOGIN LOGIC
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errEl = document.getElementById('error-msg');
            const card = document.getElementById('login-card');

            if (!username || !password) {
                showError('Operator ID and Access Code are required.');
                return;
            }

            btn.classList.add('loading');
            btn.textContent = '◈  AUTHENTICATING...';
            errEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    btn.textContent = '✔  ACCESS GRANTED';
                    btn.style.background = 'linear-gradient(135deg, #00833a, #00ff88)';
                    btn.style.color = '#000';
                    await new Promise(r => setTimeout(r, 700));
                    window.location.href = '/';
                } else {
                    showError(data.error || 'Invalid credentials');
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 400);
                    btn.classList.remove('loading');
                    btn.textContent = '◈  INITIATE ACCESS';
                }
            } catch(e) {
                showError('Connection error — system offline.');
                btn.classList.remove('loading');
                btn.textContent = '◈  INITIATE ACCESS';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = '⚠ ' + msg;
            el.style.display = 'block';
        }

        // Enter key to submit
        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>
</body>
</html>
